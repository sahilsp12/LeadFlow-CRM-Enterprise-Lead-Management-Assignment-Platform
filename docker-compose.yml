version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: lms-postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: lead_management_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: lms-express-backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@db:5432/lead_management_db
      DB_SSL: "false"
      JWT_SECRET: supersecretjwtkeyforaccess123!@#
      JWT_REFRESH_SECRET: supersecretjwtkeyforrefresh456!@#
      JWT_ACCESS_EXPIRY: 15m
      JWT_REFRESH_EXPIRY: 7d
      CLIENT_URL: http://localhost
      RANDOMUSER_API: https://randomuser.me/api/
    depends_on:
      - db

  frontend:
    build: ./frontend
    container_name: lms-nginx-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
